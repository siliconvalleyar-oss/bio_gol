publish_to: 'none'
version: 1.0.4+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0
  share_plus: ^10.0.0
